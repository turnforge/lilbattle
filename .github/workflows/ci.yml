name: CI
on:
  push:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Check no local replace directives
        run: |
          if grep -q "^replace " go.mod; then
            echo "ERROR: Active replace directives in go.mod"
            exit 1
          fi
          if grep -q '"link:' web/package.json; then
            echo "ERROR: link: dependencies in web/package.json"
            exit 1
          fi

      - name: Go build
        run: go build $(go list ./... | grep -v -E 'cmd/(wasm|repl|indexer)|tests/')

      - name: Go tests
        run: go test ./tests/... ./cmd/cli/... ./lib/... ./services/authz/... ./services/r2/... ./web/server/... ./web/assets/themes/...

      - name: Frontend build
        run: cd web && pnpm install --frozen-lockfile && pnpm run buildprod

      - name: Build WASM
        # wasmLoading.test.ts asserts the binary loads end-to-end, so build the
        # real artifact here (replaces the /dev/null compile-only check).
        run: |
          mkdir -p web/static/wasm
          GOOS=js GOARCH=wasm go build -ldflags="-s -w" -trimpath -o web/static/wasm/lilbattle-cli.wasm ./cmd/wasm
          cp "$(go env GOROOT)/lib/wasm/wasm_exec.js" web/static/wasm/wasm_exec.js

      - name: Frontend tests
        run: cd web && pnpm test
